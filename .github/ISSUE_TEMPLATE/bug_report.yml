name: Bug report
description: Report a reproducible problem in an UllrAI project.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a problem.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and its impact.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable reproduction you can.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include the project version, browser, OS, runtime, or device.
  - type: textarea
    id: evidence
    attributes:
      label: Logs or screenshots
      description: Remove credentials and personal data before posting.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I removed credentials and personal data from this report.
          required: true
